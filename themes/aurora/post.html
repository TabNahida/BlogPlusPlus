<article class="post-single">
    <header class="post-header">
        <h1>{{title}}</h1>
        <p class="meta">{{date}}</p>
        <p class="meta">By {{authors}}</p>
        <div class="tags">{{tags}}</div>
    </header>
    <section class="post-content">
        {{content}}
    </section>
</article>
