<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{page_title}} | {{site_title}}</title>
    <meta name="description" content="{{description}}" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Sora:wght@500;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/assets/style.css" />
    {{head_extra}}
</head>
<body>
    <div class="grid-glow"></div>
    <header class="site-header">
        <a class="brand" href="/">{{site_title}}</a>
        <nav class="nav-links">{{nav}}</nav>
        <button type="button" class="theme-toggle" data-theme-toggle>Palette</button>
    </header>
    <main class="page-shell">{{content}}</main>
    <footer class="site-footer"><span>{{year}} {{site_title}}</span>{{footer_extra}}</footer>
    {{body_extra}}
</body>
</html>
